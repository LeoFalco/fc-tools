name: Merged prs

on:
  schedule:
    # 21:00 UTC = 18:00 horário de Brasília (UTC-3), segunda a sexta
    - cron: '0 21 * * 1-5'
  workflow_dispatch:

permissions:
  contents: read

jobs:
  notify:
    environment:
      name: master
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Send to Google Chat
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          GOOGLE_CHAT_WEBHOOK_URL: ${{ secrets.GOOGLE_CHAT_WEBHOOK_URL }}
        run: |
          gh auth status
          node src/index.js merged --team GRID --from today --to today --chat

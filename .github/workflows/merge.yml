name: Merge

on:
  workflow_dispatch:
    inputs:
      confirm:
        description: 'Confirm merge execution'
        required: false
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  merge:
    environment:
      name: master
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          cache: npm
          node-version-file: .nvmrc

      - name: Install dependencies
        run: npm ci

      - name: Run merge
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
          FLUX_TOKEN: ${{ secrets.FLUX_TOKEN }}
        run: |
          gh auth status
          node src/index.js merge --flux ${{ inputs.confirm && '--confirm' || '' }}
